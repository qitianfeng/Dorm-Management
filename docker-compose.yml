# Docker Compose configuration for Dormitory Management System
name: dormitory-management-system

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: dormitory-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: dormitory_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro
    networks:
      - dormitory-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: dormitory-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - dormitory-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dormitory-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dormitory_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dormitory-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/api-docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # PC管理后台前端
  admin:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    container_name: dormitory-admin
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./frontend/admin/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - dormitory-network

  # H5移动端前端
  h5:
    build:
      context: ./frontend/h5
      dockerfile: Dockerfile
    container_name: dormitory-h5
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./frontend/h5/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - dormitory-network

networks:
  dormitory-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
