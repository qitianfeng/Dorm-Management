# 测试环境配置
server:
  port: 8081

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  h2:
    console:
      enabled: true

jwt:
  secret: TestSecretKeyForJWTTokenGenerationAndValidation
  expiration: 86400000
  header: Authorization
  prefix: Bearer

logging:
  level:
    root: INFO
    com.dormitory: DEBUG
